<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JeniMcRich Recruitment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --slate-900:#0f172a;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;
  --slate-500:#64748b;--slate-400:#94a3b8;--slate-300:#cbd5e1;--slate-200:#e2e8f0;
  --slate-100:#f1f5f9;--slate-50:#f8fafc;
  --emerald-600:#059669;--emerald-500:#10b981;--emerald-100:#d1fae5;--emerald-50:#ecfdf5;
  --amber-500:#f59e0b;--amber-100:#fef3c7;--red-500:#ef4444;--red-100:#fee2e2;
  --blue-500:#3b82f6;--blue-100:#dbeafe;--purple-500:#8b5cf6;--purple-100:#ede9fe;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
  --shadow-lg:0 10px 25px rgba(15,23,42,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--slate-100);color:var(--slate-800);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}

/* ---------- Login ---------- */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,var(--slate-900) 0%,#134e4a 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:var(--shadow-lg)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--emerald-500),#0d9488);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.login-card h1{font-size:22px;color:var(--slate-900)}
.login-sub{color:var(--slate-500);margin:4px 0 24px}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;font-size:12px;color:var(--slate-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--slate-300);border-radius:8px;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--emerald-500);box-shadow:0 0 0 3px var(--emerald-100)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-weight:600;font-size:13.5px;transition:all .15s}
.btn-primary{background:var(--emerald-600);color:#fff}
.btn-primary:hover{background:#047857}
.btn-dark{background:var(--slate-800);color:#fff}
.btn-dark:hover{background:var(--slate-900)}
.btn-ghost{background:transparent;color:var(--slate-600);border:1px solid var(--slate-300)}
.btn-ghost:hover{background:var(--slate-100)}
.btn-danger{background:var(--red-500);color:#fff}
.btn-sm{padding:6px 10px;font-size:12.5px}
.btn-block{width:100%;justify-content:center}
.login-err{background:var(--red-100);color:#b91c1c;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.login-divider{display:flex;align-items:center;gap:10px;color:var(--slate-400);font-size:12px;margin:16px 0}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--slate-200)}

/* ---------- Layout ---------- */
#app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:var(--slate-900);color:var(--slate-300);display:flex;flex-direction:column;z-index:50}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--slate-700)}
.sidebar-brand .name{font-weight:700;color:#fff;font-size:15px;line-height:1.15}
.sidebar-brand .tag{font-size:10.5px;color:var(--slate-400)}
.nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--slate-300);font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-size:13.5px}
.nav-item:hover{background:var(--slate-800);color:#fff}
.nav-item.active{background:var(--emerald-600);color:#fff}
.nav-item .nv-ic{width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red-500);color:#fff;font-size:10.5px;font-weight:700;border-radius:10px;padding:1px 7px}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--slate-700);font-size:12.5px}
.sidebar-foot .u{color:#fff;font-weight:600}
.main{margin-left:230px;min-height:100vh}
.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--slate-200);padding:12px 28px;display:flex;align-items:center;gap:14px;z-index:40}
.topbar h2{font-size:18px;color:var(--slate-900);flex:1}
.bell{position:relative;background:none;border:1px solid var(--slate-300);border-radius:8px;width:36px;height:36px;font-size:16px}
.bell-dot{position:absolute;top:-5px;right:-5px;background:var(--red-500);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px}
.content{padding:24px 28px 60px}

/* ---------- Common components ---------- */
.card{background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--slate-200)}
.card-pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
.stat .lbl{font-size:12px;color:var(--slate-500);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat .val{font-size:26px;font-weight:800;color:var(--slate-900);margin-top:4px}
.stat .sub{font-size:12px;color:var(--slate-500);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2.5px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.b-emerald{background:var(--emerald-100);color:#065f46}
.b-amber{background:var(--amber-100);color:#92400e}
.b-red{background:var(--red-100);color:#991b1b}
.b-blue{background:var(--blue-100);color:#1e40af}
.b-slate{background:var(--slate-200);color:var(--slate-700)}
.b-purple{background:var(--purple-100);color:#5b21b6}
.score-pill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:3px 8px;border-radius:8px;font-weight:800;font-size:13px}
.s-high{background:var(--emerald-100);color:#065f46}
.s-mid{background:var(--amber-100);color:#92400e}
.s-low{background:var(--red-100);color:#991b1b}
table.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--slate-500);padding:10px 12px;border-bottom:1px solid var(--slate-200);background:var(--slate-50)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--slate-100);vertical-align:middle}
.tbl tr:hover td{background:var(--slate-50)}
.tbl tr.sel td{background:var(--emerald-50)}
.link{color:var(--emerald-600);font-weight:600;cursor:pointer;background:none;border:none;font-size:inherit;padding:0}
.link:hover{text-decoration:underline}
.flag-btn{background:none;border:none;font-size:16px;opacity:.35}
.flag-btn.on{opacity:1}
.muted{color:var(--slate-500)}
.small{font-size:12.5px}
.flex{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wrap{flex-wrap:wrap}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
h3.sec{font-size:15px;color:var(--slate-900);margin-bottom:10px}
.empty{padding:40px;text-align:center;color:var(--slate-400)}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;z-index:200;overflow-y:auto;padding:40px 16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:640px;max-width:100%;box-shadow:var(--shadow-lg)}
.modal.wide{width:860px}
.modal-head{padding:16px 22px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;color:var(--slate-900)}
.modal-body{padding:20px 22px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:10px}
.x-btn{background:none;border:none;font-size:20px;color:var(--slate-400)}

/* ---------- Toast ---------- */
#toasts{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--slate-900);color:#fff;padding:11px 16px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:13px;max-width:340px;animation:tin .25s ease}
.toast.ok{border-left:4px solid var(--emerald-500)}
.toast.warn{border-left:4px solid var(--amber-500)}
@keyframes tin{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}

/* ---------- Kanban ---------- */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
.kcol{background:var(--slate-50);border:1px solid var(--slate-200);border-radius:12px;min-width:240px;width:240px;flex-shrink:0}
.kcol-head{padding:11px 14px;font-weight:700;font-size:13px;color:var(--slate-700);border-bottom:1px solid var(--slate-200);display:flex;justify-content:space-between;align-items:center}
.kcol-cnt{background:var(--slate-200);border-radius:10px;padding:1px 8px;font-size:11.5px}
.kcol-body{padding:10px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.kcol.dragover{outline:2px dashed var(--emerald-500);outline-offset:-3px;background:var(--emerald-50)}
.kcard{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:10px 12px;cursor:grab;box-shadow:var(--shadow)}
.kcard:active{cursor:grabbing}
.kcard .nm{font-weight:700;font-size:13px;color:var(--slate-900)}
.kcard .rl{font-size:11.5px;color:var(--slate-500);margin:2px 0 6px}
.kcard.stalled{border-left:3px solid var(--amber-500)}

/* ---------- Matchmaker ---------- */
.dropzone{border:2px dashed var(--slate-300);border-radius:14px;padding:40px;text-align:center;background:#fff;transition:all .15s}
.dropzone.over{border-color:var(--emerald-500);background:var(--emerald-50)}
.stage-list{list-style:none;margin-top:14px}
.stage-list li{display:flex;align-items:center;gap:10px;padding:7px 0;color:var(--slate-400);font-weight:500}
.stage-list li.act{color:var(--slate-900)}
.stage-list li.done{color:var(--emerald-600)}
.prog{height:8px;background:var(--slate-200);border-radius:6px;overflow:hidden;margin-top:14px}
.prog>div{height:100%;background:var(--emerald-500);width:0;transition:width .4s}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--slate-300);border-top-color:var(--emerald-600);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- Calendar ---------- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--slate-200);border-top:1px solid var(--slate-200)}
.cal-h{background:var(--slate-50);padding:8px;font-size:11.5px;font-weight:700;text-transform:uppercase;color:var(--slate-500);border-right:1px solid var(--slate-200);border-bottom:1px solid var(--slate-200);text-align:center}
.cal-d{min-height:92px;border-right:1px solid var(--slate-200);border-bottom:1px solid var(--slate-200);padding:6px;background:#fff}
.cal-d.dim{background:var(--slate-50)}
.cal-d .dn{font-size:12px;font-weight:600;color:var(--slate-500)}
.cal-d.today .dn{background:var(--emerald-600);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center}
.cal-ev{background:var(--emerald-100);color:#065f46;border-radius:5px;padding:2px 6px;font-size:10.5px;font-weight:600;margin-top:3px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- Misc ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--slate-200);margin-bottom:16px}
.tab{padding:9px 16px;border:none;background:none;font-weight:600;color:var(--slate-500);border-bottom:2px solid transparent;font-size:13.5px}
.tab.active{color:var(--emerald-600);border-bottom-color:var(--emerald-600)}
.note{background:var(--slate-50);border:1px solid var(--slate-200);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.timeline{list-style:none}
.timeline li{position:relative;padding:0 0 16px 22px;border-left:2px solid var(--slate-200);margin-left:6px}
.timeline li::before{content:'';position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--emerald-500)}
.bulkbar{position:sticky;top:61px;z-index:30;background:var(--slate-900);color:#fff;border-radius:12px;padding:10px 16px;display:none;align-items:center;gap:10px;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.bulkbar.show{display:flex}
.filter-side{width:215px;flex-shrink:0}
.filter-group{margin-bottom:16px}
.filter-group .fg-t{font-size:11.5px;font-weight:700;text-transform:uppercase;color:var(--slate-500);margin-bottom:7px;letter-spacing:.4px}
.fchk{display:flex;align-items:center;gap:7px;padding:3.5px 0;font-size:13px;color:var(--slate-700);cursor:pointer}
.tag-chip{cursor:pointer}
.match-card{border-left:4px solid var(--slate-300)}
.match-card.hi{border-left-color:var(--emerald-500)}
.match-card.md{border-left-color:var(--amber-500)}
.match-card.lo{border-left-color:var(--red-500)}
.edge{background:linear-gradient(90deg,var(--emerald-50),#fff);border:1px solid var(--emerald-100);border-radius:8px;padding:9px 12px;font-size:13px;margin:10px 0}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pc-list{list-style:none;font-size:13px}
.pc-list li{padding:3px 0 3px 20px;position:relative}
.pc-list.pros li::before{content:'✓';position:absolute;left:0;color:var(--emerald-600);font-weight:700}
.pc-list.cons li::before{content:'✕';position:absolute;left:0;color:var(--red-500);font-weight:700}
.slot{border:1px solid var(--slate-300);border-radius:8px;padding:7px 12px;background:#fff;font-weight:600;font-size:13px}
.slot:hover{border-color:var(--emerald-500);background:var(--emerald-50)}
.slot.taken{opacity:.4;text-decoration:line-through;pointer-events:none}
.sc-row{display:grid;grid-template-columns:1fr 160px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--slate-100)}
.stars button{background:none;border:none;font-size:18px;opacity:.25;padding:0 1px}
.stars button.on{opacity:1}
.cmp-grid{display:grid;gap:14px}
@media print{.sidebar,.topbar,.bulkbar{display:none}.main{margin:0}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="logo-mark">JM</div><h1>JeniMcRich Recruitment</h1></div>
    <p class="login-sub">Recruiter Workspace — sign in to continue</p>
    <div class="login-err" id="loginErr"></div>
    <div class="field"><label>Work Email</label><input id="loginEmail" type="email" placeholder="you@jenimcrich.com"></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Sign In</button>
    <div class="login-divider">or</div>
    <button class="btn btn-dark btn-block" onclick="demoLogin()">⚡ Demo Login (Recruiter)</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="logo-mark">JM</div><div><div class="name">JeniMcRich</div><div class="tag">RECRUITMENT</div></div></div>
    <nav class="nav" id="navMenu"></nav>
    <div class="sidebar-foot"><div class="u" id="userName">—</div><div class="muted" id="userEmail">—</div><button class="link" style="color:var(--slate-400);margin-top:6px" onclick="logout()">Sign out</button></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <button class="bell" onclick="openNotifs()" title="Notifications">🔔<span class="bell-dot" id="bellDot" style="display:none">0</span></button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div id="toasts"></div>
<input type="file" id="fileInput" style="display:none" accept=".txt,.pdf,.doc,.docx">

<script>
/* ================= UTILITIES ================= */
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const daysAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString()};
const daysAhead=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const fmtD=iso=>new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const fmtDT=iso=>new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const daysIn=iso=>Math.floor((Date.now()-new Date(iso))/864e5);
const uid=()=>Math.random().toString(36).slice(2,9);
function toast(msg,cls='ok'){const t=document.createElement('div');t.className='toast '+cls;t.innerHTML=msg;$('toasts').appendChild(t);setTimeout(()=>t.remove(),4200)}
function scoreCls(s){return s>=80?'s-high':s>=60?'s-mid':'s-low'}

/* ================= DATA ================= */
const STAGES=['Applied','Screening','Interview','Offer','Hired','Rejected'];
const STAGE_BADGE={Applied:'b-slate',Screening:'b-blue',Interview:'b-purple',Offer:'b-amber',Hired:'b-emerald',Rejected:'b-red'};
const SOURCES=['LinkedIn','Referral','Job Portal','Indeed','Agency'];
const SC_CATS=[{k:'Technical Skills',w:3},{k:'Industry Experience',w:3},{k:'Communication',w:2},{k:'Leadership',w:2},{k:'Culture Fit',w:1},{k:'Problem-Solving',w:2}];

function seedData(){
 const J=(id,title,client,location,skills,minYears,salary,reqs,desc,status='Open',openedDays=40)=>({id,title,client,location,skills,minYears,salary,reqs,desc,status,openedAt:daysAgo(openedDays)});
 const jobs=[
  J('j1','Plant Manager – Cement','Helix Cement Corp','Cebu, PH',[['Plant Operations',3],['Kiln Management',3],['Safety Compliance',2],['Team Leadership',2],['Budgeting',1]],10,'₱180k–240k/mo',['10+ yrs cement plant operations','Kiln & pyro-processing expertise','ISO 45001 safety leadership','Managed 100+ headcount'],'Lead full plant P&L for a 2.5 MTPA cement line.'),
  J('j2','Quarry Supervisor – Aggregates','Stonebridge Aggregates','Rizal, PH',[['Quarry Operations',3],['Blasting',3],['Heavy Equipment',2],['Safety Compliance',2],['Production Planning',1]],6,'₱90k–120k/mo',['6+ yrs quarry supervision','Licensed blaster preferred','DENR/MGB compliance','Fleet & crusher scheduling'],'Supervise drilling, blasting and crushing operations.'),
  J('j3','Maintenance Reliability Engineer','Orion Mining Group','Davao, PH',[['Reliability Engineering',3],['Predictive Maintenance',3],['SAP PM',2],['Root Cause Analysis',2],['Vibration Analysis',2]],5,'₱110k–150k/mo',['5+ yrs reliability in mining/heavy industry','CMRP preferred','Predictive maintenance program ownership','SAP PM proficiency'],'Own asset reliability strategy for fixed & mobile plant.'),
  J('j4','HSE Manager – Mining','Orion Mining Group','Surigao, PH',[['Safety Compliance',3],['HSE Management',3],['Incident Investigation',2],['Training',2],['Audit',1]],8,'₱140k–180k/mo',['8+ yrs HSE in mining','ISO 45001 lead auditor','Fatality-prevention programs','Regulatory liaison (DENR, DOLE)'],'Drive site-wide HSE strategy across two mine sites.'),
  J('j5','Electrical Engineer – Plant','Helix Cement Corp','Cebu, PH',[['Electrical Systems',3],['PLC Programming',2],['Motor Control',2],['Power Distribution',2],['Safety Compliance',1]],4,'₱80k–110k/mo',['4+ yrs plant electrical','PLC/SCADA exposure','MV/LV distribution','PEE/REE license'],'Maintain and improve plant electrical systems.'),
  J('j6','Logistics Coordinator','Stonebridge Aggregates','Rizal, PH',[['Logistics',3],['Dispatch',2],['ERP Systems',2],['Vendor Management',1],['Excel',1]],3,'₱45k–60k/mo',['3+ yrs logistics/dispatch','Truck fleet coordination','ERP literacy','Strong Excel'],'Coordinate outbound aggregate dispatch & fleet.','On Hold',25),
 ];
 const C=(o)=>Object.assign({tags:[],flagged:false,docs:[],notes:[],scorecards:[],interviews:[],activity:[],archived:false},o);

/* ================= MATCH SCORING ENGINE ================= */
function matchScore(cand,job){
 let total=0,got=0;const pros=[],cons=[],gaps=[];
 job.skills.forEach(([skill,w])=>{
  total+=w*10;
  const cs=cand.skills.find(s=>s[0].toLowerCase()===skill.toLowerCase());
  if(cs){const ratio=Math.min(cs[1]/Math.max(job.minYears*0.6,1),1);got+=w*10*(0.5+0.5*ratio);
   pros.push(`${skill}: ${cs[1]} yrs experience${ratio>=1?' (exceeds requirement)':''}`);}
  else{cons.push(`No demonstrated ${skill} experience`);gaps.push(skill);}
 });
 total+=20;
 const yr=Math.min(cand.yearsExp/job.minYears,1.25);got+=20*Math.min(yr,1);
 if(cand.yearsExp>=job.minYears)pros.push(`${cand.yearsExp} yrs total experience vs ${job.minYears} required`);
 else cons.push(`Only ${cand.yearsExp} yrs total experience (${job.minYears} required)`);
 if(cand.certifications.length){got+=Math.min(cand.certifications.length*2,6);total+=6;pros.push('Certifications: '+cand.certifications.join(', '));}else total+=6;
 const score=Math.round(got/total*100);
 const top=cand.skills.slice().sort((a,b)=>b[1]-a[1])[0];
 const edge=top?`${cand.name.split(' ')[0]}'s strongest edge: ${top[1]} years of ${top[0]}${cand.certifications[0]?', backed by '+cand.certifications[0]:''}.`:'';
 return {score,pros,cons,gaps,edge};
}
function bestScoreFor(cand){const j=jobById(cand.jobId);return j?matchScore(cand,j).score:0}

function stalledCands(){
 if(!DB.settings.stalledEnabled)return[];
 return DB.candidates.filter(c=>!c.archived&&!['Hired','Rejected'].includes(c.stage)&&daysIn(c.stageEnteredAt)>=DB.settings.stalledDays);
}
function todayInterviews(){
 const today=new Date().toISOString().slice(0,10);const out=[];
 DB.candidates.forEach(c=>c.interviews.forEach(iv=>{if(iv.date===today&&iv.status==='Scheduled')out.push({c,iv})}));
 return out;
}
function upcomingInterviews(){
 const today=new Date().toISOString().slice(0,10);const out=[];
 DB.candidates.forEach(c=>c.interviews.forEach(iv=>{if(iv.date>=today&&iv.status==='Scheduled')out.push({c,iv})}));
 return out.sort((a,b)=>(a.iv.date+a.iv.time).localeCompare(b.iv.date+b.iv.time));
}
function notifCount(){return stalledCands().length+todayInterviews().length}
function updateBell(){const n=notifCount();const d=$('bellDot');d.style.display=n?'block':'none';d.textContent=n}

let candSel=new Set(),candFilters={q:'',stages:new Set(),tags:new Set(),jobs:new Set(),flagged:false};

function filteredCands(){
 const f=candFilters,q=f.q.toLowerCase();
 return DB.candidates.filter(c=>{
  if(c.archived)return false;
  if(f.flagged&&!c.flagged)return false;
  if(f.stages.size&&!f.stages.has(c.stage))return false;
  if(f.jobs.size&&!f.jobs.has(c.jobId))return false;
  if(f.tags.size&&![...f.tags].some(t=>c.tags.includes(t)))return false;
  if(q&&!(c.name.toLowerCase().includes(q)||c.resumeText.toLowerCase().includes(q)||c.skills.some(s=>s[0].toLowerCase().includes(q))))return false;
  return true;
 }).sort((a,b)=>bestScoreFor(b)-bestScoreFor(a));

   return `<tr class="${candSel.has(c.id)?'sel':''}">

    <td><span class="badge ${STAGE_BADGE[c.stage]}">${c.stage}</span></td>
    <td class="small">${esc(c.source)}</td>
    <td>${c.tags.map(t=>`<span class="badge b-purple tag-chip" onclick="togF('tags','${esc(t)}')">${esc(t)}</span>`).join(' ')}</td>
    <td class="small" style="${stl?'color:var(--amber-500);font-weight:700':''}">${daysIn(c.stageEnteredAt)}d${stl?' ⚠':''}</td>
    <td><button class="btn btn-sm btn-ghost" onclick="route('candidate','${c.id}')">Open</button></td></tr>`}).join('')||'<tr><td colspan="10"><div class="empty">No candidates match these filters</div></td></tr>'}
 </table>`;
 if($('candCount'))$('candCount').textContent=`${list.length} candidate${list.length!==1?'s':''} shown · sorted by match score`;
 const bb=$('bulkbar');if(bb){bb.classList.toggle('show',candSel.size>0);if($('bulkCount'))$('bulkCount').textContent=candSel.size+' selected'}

function togSel(id){candSel.has(id)?candSel.delete(id):candSel.add(id);renderCandTable()}
function toggleAll(on){const list=filteredCands();candSel=on?new Set(list.map(c=>c.id)):new Set();renderCandTable()}

/* ---- Bulk actions ---- */
function bulkMove(){
 const stage=$('bulkStage').value;if(!stage)return toast('Choose a target stage first','warn');
 confirmDlg(`Move <b>${candSel.size}</b> candidate(s) to <b>${stage}</b>?`,()=>{
  candSel.forEach(id=>moveStage(candById(id),stage,true));
  candSel.clear();saveDB();vCandidates();toast(`Moved to ${stage} ✓`);
 });
}
function bulkArchive(){
 confirmDlg(`Archive <b>${candSel.size}</b> candidate(s)? They will be hidden from active lists (data is kept).`,()=>{
  candSel.forEach(id=>{const c=candById(id);c.archived=true;logAct(c,'system','Archived via bulk action')});
  candSel.clear();saveDB();vCandidates();toast('Archived ✓');
 });
}
function bulkTag(){
 openModal(`<div class="modal-head"><h3>Tag ${candSel.size} candidate(s)</h3><button class="x-btn" onclick="closeModal()">×</button></div>
 <div class="modal-body"><div class="field"><label>Tag</label><input id="tagInput" list="tagList" placeholder="e.g. Top Tier, Remote Ready"><datalist id="tagList">${allTags().map(t=>`<option value="${esc(t)}">`).join('')}</datalist></div></div>
 <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="applyBulkTag()">Apply tag</button></div>`);
}
function applyBulkTag(){
 const t=$('tagInput').value.trim();if(!t)return;
 candSel.forEach(id=>{const c=candById(id);if(!c.tags.includes(t)){c.tags.push(t);logAct(c,'tag','Tagged: '+t)}});
 const n=candSel.size;saveDB();closeModal();
 if(currentView==='candidate'){const id=[...candSel][0];candSel.clear();vCandidateDetail(id)}else vCandidates();
 toast(`Tagged ${n} candidate(s) with "${esc(t)}"`);
}
function confirmDlg(html,onYes){
 openModal(`<div class="modal-head"><h3>Please confirm</h3><button class="x-btn" onclick="closeModal()">×</button></div>
 <div class="modal-body">${html}</div>
 <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="confirmYes">Confirm</button></div>`);
 $('confirmYes').onclick=()=>{closeModal();onYes()};
}
function moveStage(c,stage,silent){
 if(c.stage===stage)return;
 const old=c.stage;c.stage=stage;c.stageEnteredAt=new Date().toISOString();
 logAct(c,'stage',`Stage changed: ${old} → ${stage}`);
 if(stage==='Interview'&&!silent)setTimeout(()=>offerInterviewEmail(c),150);
 saveDB();
}
function exportCandsCSV(){
 const rows=[['Name','Email','Phone','Role','Client','Stage','Match Score','Source','Tags','Years Exp','Expected Salary','Notice Period','Days in Stage','Applied']];
 filteredCands().forEach(c=>{const j=jobById(c.jobId);rows.push([c.name,c.email,c.phone,j?.title||'',j?.client||'',c.stage,bestScoreFor(c),c.source,c.tags.join('; '),c.yearsExp,c.expectedSalary,c.noticePeriod,daysIn(c.stageEnteredAt),fmtD(c.appliedAt)])});
 downloadCSV(rows,'jenimcrich_candidates.csv');toast('CSV exported ⬇');
}
function downloadCSV(rows,name){
 const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
 const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();
}

 openModal(`<div class="modal-head"><h3>Add Candidate</h3><button class="x-btn" onclick="closeModal()">×</button></div>
 <div class="modal-body">
  <div class="grid g-2"><div class="field"><label>Full name *</label><input id="nc_name"></div><div class="field"><label>Email *</label><input id="nc_email"></div>
  <div class="field"><label>Phone</label><input id="nc_phone"></div><div class="field"><label>Applying for *</label><select id="nc_job">${DB.jobs.map(j=>`<option value="${j.id}">${esc(j.title)}</option>`).join('')}</select></div>
  <div class="field"><label>Source</label><select id="nc_src">${SOURCES.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="field"><label>Years of experience</label><input id="nc_yrs" type="number" value="3"></div>

 </div>
 <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewCandidate()">Add candidate</button></div>`);
}
function saveNewCandidate(){
 const name=$('nc_name').value.trim(),email=$('nc_email').value.trim();
 if(!name||!email)return toast('Name and email are required','warn');
 const skills=$('nc_skills').value.split(',').map(s=>s.trim()).filter(Boolean).map(s=>{const[n,y]=s.split(':');return[n.trim(),parseInt(y)||1]});
 const c={id:uid(),name,email,phone:$('nc_phone').value,jobId:$('nc_job').value,stage:'Applied',source:$('nc_src').value,yearsExp:+$('nc_yrs').value||0,skills,certifications:[],summary:$('nc_sum').value,expectedSalary:$('nc_sal').value,noticePeriod:$('nc_not').value,resumeText:$('nc_sum').value+' '+skills.map(s=>s[0]).join(', '),tags:[],flagged:false,docs:[],notes:[],scorecards:[],interviews:[],activity:[],archived:false,appliedAt:new Date().toISOString(),stageEnteredAt:new Date().toISOString(),lastActivityAt:new Date().toISOString()};
 logAct(c,'stage','Application created manually');
 DB.candidates.unshift(c);saveDB();closeModal();vCandidates();toast('Candidate added ✓');
}

function openCompare(){

 openModal(`<div class="modal-head"><h3>Side-by-side comparison</h3><button class="x-btn" onclick="closeModal()">×</button></div>
 <div class="modal-body"><div class="cmp-grid" style="grid-template-columns:repeat(${cs.length},1fr)">
 ${cs.map(c=>{const j=jobById(c.jobId),m=j?matchScore(c,j):{score:0};const agg=aggScore(c);
  return `<div class="card card-pad">
   <b>${esc(c.name)}</b><div class="small muted mb8">${esc(j?.title||'')}</div>
   <div class="mb8"><span class="score-pill ${scoreCls(m.score)}">${m.score}</span> <span class="small muted">match</span> ${agg?`&nbsp;<span class="score-pill s-high">${agg}★</span> <span class="small muted">interview avg</span>`:''}</div>
   <div class="small"><b>Experience:</b> ${c.yearsExp} yrs</div>
   <div class="small"><b>Expected:</b> ${esc(c.expectedSalary)}</div>
   <div class="small"><b>Notice:</b> ${esc(c.noticePeriod)}</div>
   <div class="small mt8"><b>Skills</b></div>${c.skills.map(s=>`<div class="small">· ${esc(s[0])} (${s[1]}y)</div>`).join('')}
   <div class="small mt8"><b>Latest note</b><div class="muted">${esc(c.notes[0]?.text||'—')}</div></div>
  </div>`}).join('')}
 </div></div>
 <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`,true);
}
function aggScore(c){
 if(!c.scorecards.length)return 0;
 let tw=0,ts=0;c.scorecards.forEach(sc=>SC_CATS.forEach(cat=>{const r=sc.ratings[cat.k];if(r){ts+=r*cat.w;tw+=cat.w}}));
 return tw?(ts/tw).toFixed(1):0;
}

function dSchedule(c){

  <div class="card card-pad"><h3 class="sec">Scheduled interviews</h3>

  </div></div>`;

function dSchedRefresh(id){
 const date=$('ivDate').value;const taken=new Set();

 document.querySelectorAll('#slotWrap .slot').forEach(b=>b.classList.toggle('taken',taken.has(date+'_'+b.dataset.t)));

function bookSlot(id,time){

 c.interviews.push({id:uid(),date,time,interviewer:who,type,status:'Scheduled'});

 saveDB();dSchedule(c);updateBell();buildNav();toast('Interview booked ✓ Calendar blocked & confirmations sent');

function cancelIv(cid,ivid){const c=candById(cid);const iv=c.interviews.find(x=>x.id===ivid);iv.status='Cancelled';logAct(c,'interview',iv.type+' cancelled');saveDB();dSchedule(c)}

/* ================= MATCHMAKER ================= */
const SAMPLE_RESUMES=[
 {name:'Alex Miller',years:14,skills:[['Plant Operations',14],['Kiln Management',11],['Safety Compliance',9],['Team Leadership',10],['Budgeting',6]],certs:['ISO 45001 Lead Auditor','Six Sigma Black Belt'],summary:'Cement plant leader; ran a 3 MTPA integrated line with 220 staff, cut kiln downtime 18%.'},
 {name:'Sarah Jenkins',years:8,skills:[['Reliability Engineering',8],['Predictive Maintenance',7],['SAP PM',5],['Root Cause Analysis',6],['Vibration Analysis',4]],certs:['CMRP'],summary:'Reliability engineer; built PdM program cutting unplanned downtime 31% at a nickel mine.'},
 {name:'Marcus Thompson',years:7,skills:[['Quarry Operations',7],['Blasting',5],['Heavy Equipment',6],['Safety Compliance',4],['Production Planning',3]],certs:['Licensed Blaster (PNP-FED)'],summary:'Quarry supervisor; full drill-blast-crush ownership, crusher utilization to 87%.'},
];
function vMatchmaker(){
 const openJobs=DB.jobs.filter(j=>j.status==='Open');
 $('content').innerHTML=`
 <div class="grid g-2" style="grid-template-columns:.9fr 1.1fr">
  <div>
   <div class="dropzone" id="dz" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="event.preventDefault();this.classList.remove('over');mmUploadFile(event.dataTransfer.files[0])">

    <h3 class="mt8">Drop a resume here</h3>
    <p class="muted small mt8">or</p>
    <button class="btn btn-primary mt8" onclick="mmPick()">Browse files</button>
    <p class="small muted mt12">PDF, DOC, TXT — parsed automatically (simulated extraction in demo)</p>
   </div>
   <div class="card card-pad mt16"><h3 class="sec">Or test with a sample resume</h3>
    <div class="flex wrap">${SAMPLE_RESUMES.map((r,i)=>`<button class="btn btn-ghost btn-sm" onclick="runMatch(${i})">${esc(r.name)}</button>`).join('')}</div>
    <p class="small muted mt8">Cross-references against <b>${openJobs.length} active JDs</b> with weighted skill scoring.</p>
   </div>
  </div>
  <div id="mmRight"><div class="card card-pad"><div class="empty">Upload or pick a sample resume to see ranked matches against every open role — with pros, gaps and "the edge".</div></div></div>
 </div>`;
}
function mmPick(){const fi=$('fileInput');fi.onchange=()=>{if(fi.files[0])mmUploadFile(fi.files[0]);fi.value=''};fi.click()}
function mmUploadFile(file){
 if(!file)return;
 const r=SAMPLE_RESUMES[Math.floor(Math.random()*SAMPLE_RESUMES.length)];
 runMatch(SAMPLE_RESUMES.indexOf(r),file.name);
}
function runMatch(idx,fname){
 const r=SAMPLE_RESUMES[idx];
 const openJobs=DB.jobs.filter(j=>j.status==='Open');
 const stages=['Extracting text'+(fname?' from '+fname:'')+'…','Parsing skills & certifications…',`Cross-referencing ${openJobs.length} active JDs…`,'Analyzing skill gaps…','Ranking matches…'];
 $('mmRight').innerHTML=`<div class="card card-pad"><h3 class="sec">Analyzing resume…</h3><ul class="stage-list" id="mmStages">${stages.map(s=>`<li><span class="dot">○</span> ${s}</li>`).join('')}</ul><div class="prog"><div id="mmProg"></div></div></div>`;
 const lis=document.querySelectorAll('#mmStages li');
 let i=0;
 const step=()=>{
  if(i>0){lis[i-1].classList.remove('act');lis[i-1].classList.add('done');lis[i-1].firstElementChild.textContent='✓'}
  if(i<lis.length){lis[i].classList.add('act');lis[i].firstElementChild.outerHTML='<span class="spin"></span>';$('mmProg').style.width=((i+1)/lis.length*100)+'%';i++;setTimeout(step,520)}
  else showMatches(r);
 };step();
}
function showMatches(r){
 const cand={name:r.name,skills:r.skills,yearsExp:r.years,certifications:r.certs};
 const results=DB.jobs.filter(j=>j.status==='Open').map(j=>({j,m:matchScore(cand,j)})).sort((a,b)=>b.m.score-a.m.score);
 $('mmRight').innerHTML=`
 <div class="card card-pad mb16">
  <div class="flex-between"><div><h3 class="sec" style="margin:0">${esc(r.name)}</h3><div class="small muted">${r.years} yrs experience · ${r.certs.join(', ')||'no certifications'}</div></div>
  <button class="btn btn-sm btn-primary" onclick="addFromMatch(${SAMPLE_RESUMES.indexOf(r)})">+ Add to candidates</button></div>
  <p class="small mt8">${esc(r.summary)}</p>
  <div class="mt8">${r.skills.map(s=>`<span class="badge b-blue" style="margin:2px">${esc(s[0])} · ${s[1]}y</span>`).join('')}</div>
 </div>
 ${results.map(({j,m})=>`<div class="card card-pad mb16 match-card ${m.score>=80?'hi':m.score>=60?'md':'lo'}">
  <div class="flex-between"><div><b>${esc(j.title)}</b><div class="small muted">${esc(j.client)} · ${esc(j.location)}</div></div><span class="score-pill ${scoreCls(m.score)}" style="font-size:16px;padding:5px 11px">${m.score}</span></div>
  <div class="edge">⚡ <b>The Edge:</b> ${esc(m.edge)}</div>
  <div class="pc-grid"><div><b class="small">Pros</b><ul class="pc-list pros">${m.pros.slice(0,4).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>
  <div><b class="small">Cons / Gaps</b><ul class="pc-list cons">${m.cons.slice(0,4).map(p=>`<li>${esc(p)}</li>`).join('')||'<li style="padding-left:0">None identified</li>'}</ul></div></div>
  ${m.gaps.length?`<div class="small mt8"><b>Skill gaps:</b> ${m.gaps.map(g=>`<span class="badge b-red">${esc(g)}</span>`).join(' ')}</div>`:''}
 </div>`).join('')}`;
}
function addFromMatch(idx){
 const r=SAMPLE_RESUMES[idx];
 const best=DB.jobs.filter(j=>j.status==='Open').map(j=>({j,s:matchScore({skills:r.skills,yearsExp:r.years,certifications:r.certs},j).score})).sort((a,b)=>b.s-a.s)[0];
 const c={id:uid(),name:r.name+' (import)',email:r.name.toLowerCase().replace(/\s+/g,'.')+'@gmail.com',phone:'+63 9'+Math.floor(Math.random()*9e8+1e8),jobId:best.j.id,stage:'Applied',source:'Job Portal',yearsExp:r.years,skills:r.skills,certifications:r.certs,summary:r.summary,expectedSalary:'—',noticePeriod:'30 days',resumeText:r.summary+' Skills: '+r.skills.map(s=>s[0]).join(', '),tags:[],flagged:false,docs:[{name:r.name.replace(/\s+/g,'_')+'_Resume.pdf',cat:'Resume',date:new Date().toISOString()}],notes:[],scorecards:[],interviews:[],activity:[],archived:false,appliedAt:new Date().toISOString(),stageEnteredAt:new Date().toISOString(),lastActivityAt:new Date().toISOString()};
 logAct(c,'stage','Imported via Matchmaker — auto-matched to '+best.j.title+' ('+best.s+')');
 DB.candidates.unshift(c);saveDB();toast('Added to candidates → '+esc(best.j.title));
}
</script>

 (j.hmNotes=j.hmNotes||[]).unshift({author:DB.user?.name||'Hiring Manager',text:t,ts:new Date().toISOString()});

const VISA_OPTIONS=['Not specified','US Citizens / Green Card only','TN Visa – Canadians only','TN Visa – Canadian or Mexican','H-1B transfer accepted','Open to international / sponsorship available','Local role (no visa requirement)'];
function openAddJob(){
 openModal(`<div class="modal-head"><h3>New Job Listing</h3><button class="x-btn" onclick="closeModal()">×</button></div>
 <div class="modal-body">
  <div class="note" style="background:var(--emerald-50);border-color:var(--emerald-100)">
   <div class="flex-between"><b class="small">⚡ Auto-fill from a Job Description</b>
    <div class="flex"><button class="btn btn-sm btn-ghost" onclick="jdUpload()">📄 Upload JD file</button><button class="btn btn-sm btn-primary" onclick="parseJD()">Auto-fill blanks</button></div></div>
   <textarea id="nj_jd" rows="5" placeholder="…or paste the full job description text here, then click Auto-fill blanks. I'll extract the title, location, salary, years, skills, requirements and visa terms." style="width:100%;margin-top:8px;padding:8px;border:1px solid var(--slate-300);border-radius:8px"></textarea>
   <div class="small muted mt8">Best results with .txt files or pasted text. PDF/Word: open the file, copy the text, paste above.</div>
  </div>
  <div class="grid g-2"><div class="field"><label>Title *</label><input id="nj_t" placeholder="Plant Manager – Cement"></div><div class="field"><label>Client *</label><input id="nj_c"></div>
  <div class="field"><label>Location</label><input id="nj_l"></div><div class="field"><label>Salary range</label><input id="nj_s" placeholder="$100k–140k/yr"></div>
  <div class="field"><label>Min years experience</label><input id="nj_y" type="number" value="5"></div><div class="field"><label>Status</label><select id="nj_st"><option>Open</option><option>On Hold</option></select></div></div>
  <div class="grid g-2"><div class="field"><label>Work authorization / visa</label><select id="nj_v">${VISA_OPTIONS.map(v=>`<option>${v}</option>`).join('')}</select></div>

function jdUpload(){
 const fi=$('fileInput');fi.onchange=()=>{
  const f=fi.files[0];fi.value='';if(!f)return;
  if(/\.(txt|md|text)$/i.test(f.name)){
   const rd=new FileReader();rd.onload=()=>{$('nj_jd').value=rd.result;parseJD();toast('JD loaded from '+esc(f.name)+' ✓')};rd.readAsText(f);
  }else{toast('For '+esc(f.name)+': open it, copy the text, and paste it in the box (PDF/Word parsing needs the production backend)','warn')}
 };fi.click();
}
function parseJD(){
 const txt=$('nj_jd').value;if(!txt.trim())return toast('Paste or upload a job description first','warn');
 const lines=txt.split('\n').map(l=>l.trim());
 const grab=re=>{const m=txt.match(re);return m?m[1].trim().replace(/[.;,]+$/,''):''};
 const set=(id,val)=>{if(val&&!$(id).value.trim())$(id).value=val};
 // Title
 let title=grab(/(?:job\s*title|position|role)\s*[:\-–]\s*(.+)/i);
 if(!title){const fl=lines.find(l=>l&&l.length<70);if(fl)title=fl}
 set('nj_t',title);
 // Client / company / location / salary
 set('nj_c',grab(/(?:company|client|employer)\s*[:\-–]\s*(.+)/i));
 set('nj_l',grab(/(?:location|site|based in|work\s*site)\s*[:\-–]\s*(.+)/i));
 let sal=grab(/(?:salary|compensation|pay|rate)\s*(?:range)?\s*[:\-–]\s*(.+)/i)||grab(/([\$₱€£]\s?[\d,.]+\s*[kK]?(?:\s*[-–—to]+\s*[\$₱€£]?\s?[\d,.]+\s*[kK]?)?(?:\s*(?:\/|per\s*)(?:yr|year|annum|mo|month|hr|hour))?)/);
 set('nj_s',sal);
 // Years
 const ym=txt.match(/(\d{1,2})\s*\+?\s*(?:years?|yrs?)/i);if(ym)$('nj_y').value=ym[1];
 // Visa / work authorization
 const lo=txt.toLowerCase();let visa='';
 if(/tn\s*(visa|status)/.test(lo))visa=/canadian(s)?\s*(citizens?\s*)?only/.test(lo)||(/canadian/.test(lo)&&!/mexican/.test(lo))?'TN Visa – Canadians only':'TN Visa – Canadian or Mexican';
 else if(/green\s*card|us\s*citizens?\s*only|must\s*be\s*authorized\s*to\s*work\s*in\s*the\s*(us|u\.s)/.test(lo))visa='US Citizens / Green Card only';
 else if(/h-?1b/.test(lo))visa='H-1B transfer accepted';
 else if(/sponsorship\s*(is\s*)?available|open\s*to\s*international/.test(lo))visa='Open to international / sponsorship available';
 if(visa)$('nj_v').value=visa;
 const vline=lines.find(l=>/visa|sponsor|work\s*auth|citizen/i.test(l));
 if(vline&&!$('nj_vn').value)$('nj_vn').value=vline.replace(/^[-•*]\s*/,'').slice(0,120);
 // Requirements (bullet lines)
 const reqs=lines.filter(l=>/^[-•*▪◦]\s+/.test(l)).map(l=>l.replace(/^[-•*▪◦]\s+/,'')).slice(0,8);
 if(reqs.length&&!$('nj_r').value.trim())$('nj_r').value=reqs.join('\n');
 // Skills — match against known skill dictionary + frequency weighting
 const dict=[...new Set(DB.jobs.flatMap(j=>j.skills.map(s=>s[0])).concat(DB.candidates.flatMap(c=>c.skills.map(s=>s[0]))))];
 const found=[];
 dict.forEach(sk=>{const re=new RegExp(sk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');const n=(txt.match(re)||[]).length;if(n)found.push([sk,n>=2?3:2])});
 // also catch Capitalized multiword phrases in requirements as candidate skills
 reqs.join(' ').replace(/\b([A-Z][a-z]+(?:\s[A-Z][a-z]+){1,2})\b/g,(m,p)=>{if(!found.some(f=>f[0].toLowerCase()===p.toLowerCase())&&p.split(' ').length>1)found.push([p,1]);return m});
 if(found.length&&!$('nj_sk').value.trim())$('nj_sk').value=found.slice(0,8).map(([s,w])=>s+':'+w).join(', ');
 // Description = first paragraph
 const para=txt.split(/\n\s*\n/).map(p=>p.trim()).find(p=>p.length>60&&!/^[-•*]/.test(p));
 set('nj_d',(para||'').slice(0,300));
 toast('Blanks auto-filled from JD — review & adjust before saving ✓');
}

function exportMetricsCSV(){
 const all=DB.candidates.filter(c=>!c.archived);
 const rows=[['Stage','Count']];STAGES.forEach(s=>rows.push([s,all.filter(c=>c.stage===s).length]));
 rows.push([],['Source','Total','Qualified']);SOURCES.forEach(s=>{const cs=all.filter(c=>c.source===s);rows.push([s,cs.length,cs.filter(c=>['Interview','Offer','Hired'].includes(c.stage)).length])});
 downloadCSV(rows,'jenimcrich_metrics.csv');toast('Metrics exported ⬇');
}
